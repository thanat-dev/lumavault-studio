<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LumaVault Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a class="brand" href="/">
          <span class="brand-mark">LV</span>
          <span>LumaVault Studio</span>
        </a>
        <div class="nav-links" aria-label="เมนูหลัก">
          <a href="/">Facebook Video</a>
          <a href="/">Reels</a>
          <a href="/">Private Source</a>
          <a href="/">Render</a>
          <a href="/">ภาษาไทย</a>
        </div>
      </div>
    </nav>

    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Private Facebook Media Workspace</p>
        <h1>ดาวน์โหลดวิดีโอส่วนตัวของ Facebook</h1>
        <p>วิเคราะห์ source ที่คุณมีสิทธิ์เข้าถึง แล้วเลือกดาวน์โหลดหรือ Render เป็น MP4 / MP3 ได้ในเครื่องของคุณ</p>
      </header>

      <form class="steps" id="extractForm">
        <label class="step">
          <strong>1. ป้อน URL วิดีโอ Facebook ส่วนตัวที่คุณต้องการดาวน์โหลด</strong>
          <div class="input-row">
            <span class="input-icon">f</span>
            <input
              id="pageUrl"
              type="url"
              placeholder="ตัวอย่าง: https://www.facebook.com/share/v/1XVoQfUsuL/"
              value="https://www.facebook.com/share/v/1XVoQfUsuL/"
              autocomplete="off"
            />
          </div>
        </label>

        <label class="step">
          <strong>2. คัดลอกลิงก์ด้านล่างและเปิดในแท็บบราวเซอร์ใหม่</strong>
          <div class="input-row">
            <span class="input-icon">▣</span>
            <input id="sourceUrl" type="text" readonly />
            <button class="mini" id="copySourceUrl" type="button">สำเนา</button>
          </div>
        </label>

        <label class="step">
          <strong>3. คัดลอกข้อมูลแหล่งที่มาทั้งหมดของหน้าและวางลงในกล่องด้านล่าง จากนั้นกดปุ่ม ดาวน์โหลด.</strong>
          <textarea id="source" spellcheck="false" placeholder="วางข้อมูลต้นทางของหน้าทั้งหมดที่นี่..."></textarea>
        </label>

        <div class="actions">
          <button class="primary" type="submit">ดาวน์โหลด</button>
          <button class="secondary" id="clearBtn" type="button">ล้างข้อมูล</button>
          <span class="status" id="status">พร้อมใช้งาน</span>
        </div>
      </form>

      <section class="results" id="resultPanel" aria-live="polite" hidden>
        <div class="video-card" id="videoCard"></div>

        <div class="download-table">
          <div class="tabs">
            <button class="tab active" type="button" data-tab="mp4">MP4</button>
            <button class="tab" type="button" data-tab="mp3">MP3</button>
          </div>

          <div class="table-head">
            <strong>คุณภาพ</strong>
            <strong>Render</strong>
            <strong>ดาวน์โหลด</strong>
          </div>

          <div class="table-body" id="results"></div>
        </div>

        <button class="more" id="downloadMore" type="button">ดาวน์โหลดวิดีโอเพิ่มเติม</button>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
