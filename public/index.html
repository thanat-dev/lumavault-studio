<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LumaVault Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a class="brand" href="/" aria-label="LumaVault Studio">
          <span class="brand-mark">LV</span>
          <span>LumaVault Studio</span>
        </a>
        <span class="nav-badge">Private Media Render</span>
      </div>
    </nav>

    <main class="shell">
      <section class="hero" aria-labelledby="appTitle">
        <p class="eyebrow">Facebook Private Video Downloader</p>
        <h1 id="appTitle">ดาวน์โหลดและ Render วิดีโอส่วนตัว</h1>
        <p>วางลิงก์ Facebook และ source ของหน้าที่คุณเข้าถึงได้ ระบบจะคัดตัวเลือกที่จำเป็นสำหรับดาวน์โหลดหรือ Render เป็น MP4 / MP3</p>
      </section>

      <form class="workspace" id="extractForm">
        <section class="input-panel" aria-label="ข้อมูลวิดีโอ">
          <label class="field">
            <span>URL วิดีโอ Facebook</span>
            <div class="input-row">
              <span class="input-icon">f</span>
              <input
                id="pageUrl"
                type="url"
                placeholder="https://www.facebook.com/share/v/..."
                autocomplete="off"
              />
            </div>
          </label>

          <label class="field">
            <span>ลิงก์เปิด Page Source</span>
            <div class="input-row">
              <span class="input-icon">⌘</span>
              <input id="sourceUrl" type="text" readonly />
              <button class="icon-action" id="copySourceUrl" type="button" title="คัดลอกลิงก์ source" aria-label="คัดลอกลิงก์ source">
                Copy
              </button>
            </div>
          </label>

          <label class="field">
            <span>วาง Source ทั้งหน้า</span>
            <textarea id="source" spellcheck="false" placeholder="วางข้อมูล view-source ทั้งหมดที่นี่"></textarea>
          </label>

          <div class="submit-row">
            <button class="primary" type="submit">วิเคราะห์วิดีโอ</button>
            <span class="status" id="status">พร้อมใช้งาน</span>
          </div>
        </section>

        <section class="result-panel" id="resultPanel" aria-live="polite" hidden>
          <div class="video-card" id="videoCard"></div>

          <div class="download-table">
            <div class="tabs" role="tablist" aria-label="ชนิดไฟล์">
              <button class="tab active" type="button" data-tab="mp4" role="tab">MP4</button>
              <button class="tab" type="button" data-tab="mp3" role="tab">MP3</button>
            </div>

            <div class="table-head">
              <strong>คุณภาพ</strong>
              <strong>วิธีทำไฟล์</strong>
              <strong>ดาวน์โหลด</strong>
            </div>

            <div class="table-body" id="results"></div>
          </div>
        </section>
      </form>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
