name: Deploy to Hugging Face Spaces

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Docker app to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          HF_TOKEN="$(printf '%s' "$HF_TOKEN" | tr -d '\r\n[:space:]')"
          HF_SPACE_REPO="$(printf '%s' "$HF_SPACE_REPO" | tr -d '\r\n[:space:]' | sed 's#/*$##')"

          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_REPO" ]; then
            echo "Missing HF_TOKEN or HF_SPACE_REPO repository secret."
            echo "HF_SPACE_REPO example: https://huggingface.co/spaces/your-username/lumavault-studio"
            exit 1
          fi

          case "$HF_SPACE_REPO" in
            https://huggingface.co/spaces/*)
              HF_SPACE_PATH="${HF_SPACE_REPO#https://huggingface.co/spaces/}"
              ;;
            http://huggingface.co/spaces/*)
              HF_SPACE_PATH="${HF_SPACE_REPO#http://huggingface.co/spaces/}"
              ;;
            huggingface.co/spaces/*)
              HF_SPACE_PATH="${HF_SPACE_REPO#huggingface.co/spaces/}"
              ;;
            spaces/*/*)
              HF_SPACE_PATH="${HF_SPACE_REPO#spaces/}"
              ;;
            */*)
              HF_SPACE_PATH="$HF_SPACE_REPO"
              ;;
            *)
              echo "HF_SPACE_REPO is invalid."
              echo "Use one of these formats:"
              echo "https://huggingface.co/spaces/your-username/lumavault-studio"
              echo "your-username/lumavault-studio"
              exit 1
              ;;
          esac

          if ! printf '%s' "$HF_SPACE_PATH" | grep -Eq '^[^/]+/[^/]+$'; then
            echo "HF_SPACE_REPO must point to exactly one Hugging Face Space."
            echo "Expected format: your-username/lumavault-studio"
            exit 1
          fi

          python -m pip install --quiet --upgrade huggingface_hub
          HF_SPACE_PATH="$HF_SPACE_PATH" HF_TOKEN="$HF_TOKEN" python - <<'PY'
          import os
          from huggingface_hub import HfApi

          repo_id = os.environ["HF_SPACE_PATH"]
          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
          )
          print(f"Ready to deploy Hugging Face Docker Space: {repo_id}")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push --force "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_PATH}" HEAD:main
